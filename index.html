
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV 85 - Prévention</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2b61a4">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; }
.screen { display:none }
.screen.active { display:block }
</style>
</head>

<body class="bg-gray-100 p-4">

<!-- TOAST -->
<div id="toast" class="fixed bottom-5 right-5 bg-black text-white px-4 py-2 rounded opacity-0">
<span id="toast-text"></span>
</div>

<!-- HOME -->
<div id="home" class="screen active">
<h1 class="text-xl font-bold mb-4">RESTEV Prévention</h1>

<button onclick="goManager()" class="bg-blue-600 text-white p-3 rounded w-full mb-2">
Manager
</button>

<button onclick="goEmployee()" class="bg-pink-600 text-white p-3 rounded w-full">
Salarié
</button>
</div>

<!-- MANAGER -->
<div id="manager" class="screen">

<h2 class="text-lg font-bold mb-2">Tableau des alertes</h2>

<div id="risk-list"></div>

<button onclick="goHome()" class="mt-4 bg-gray-300 p-2 rounded">
Retour
</button>

</div>

<!-- EMPLOYE -->
<div id="employee" class="screen space-y-3">

<h2 class="text-lg font-bold">Signaler un danger</h2>

<select id="risk-category" class="w-full p-2">
<option>Chute</option>
<option>Machine</option>
<option>EPI</option>
</select>

<input id="risk-location" placeholder="Zone" class="w-full p-2">

<select id="risk-level" class="w-full p-2">
<option>Critique 🔴</option>
<option>Modéré 🟠</option>
</select>

<textarea id="risk-desc" class="w-full p-2" placeholder="Description"></textarea>

<input type="file" onchange="processPhoto(event)">

<img id="preview" class="hidden w-full mt-2"/>

<button onclick="send()" class="bg-green-600 text-white p-3 w-full rounded">
Envoyer
</button>

<button onclick="goHome()" class="bg-gray-300 p-2 w-full rounded">
Retour
</button>

</div>

<!-- SCRIPT -->
<script>

let risks = [];
let photo = null;

// SUPABASE
const supabaseClient = supabase.createClient(
"https://swgaezpjlaacqutogmvb.supabase.co",
"TA_CLE"
);

// REALTIME
supabaseClient.channel('realtime')
.on('postgres_changes',
{ event:'INSERT', schema:'public', table:'risk_reports' },
payload => {
risks.unshift(payload.new);
render();
showToast("Nouvelle alerte !");
}
).subscribe();

// NAVIGATION
function goHome() {
show("home");
}

function goManager() {
show("manager");
load();
}

function goEmployee() {
show("employee");
}

function show(id) {
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

// PHOTO
function processPhoto(e) {

const file = e.target.files[0];

const reader = new FileReader();

reader.onload = ev => {
photo = ev.target.result;
document.getElementById("preview").src = photo;
document.getElementById("preview").classList.remove("hidden");
};

reader.readAsDataURL(file);
}

// SEND
async function send() {

const cat = document.getElementById("risk-category").value;
const loc = document.getElementById("risk-location").value;
const lev = document.getElementById("risk-level").value;
const desc = document.getElementById("risk-desc").value;

let url = null;

if (photo) {

const blob = await (await fetch(photo)).blob();
const name = "img_"+Date.now()+".png";

await supabaseClient.storage
.from("risk-photos")
.upload(name, blob);

const { data } = supabaseClient
.storage.from("risk-photos")
.getPublicUrl(name);

url = data.publicUrl;
}

await supabaseClient.from("risk_reports").insert([{
employee:"terrain",
company:"demo",
category:cat,
location:loc,
severity:lev,
description:desc,
photo_url:url
}]);

showToast("Envoyé");
}

// LOAD
async function load() {

const { data } = await supabaseClient
.from("risk_reports")
.select("*")
.order("created_at", { ascending:false });

risks = data;
render();
}

// UI
function render() {

const box = document.getElementById("risk-list");
box.innerHTML = "";

risks.forEach(r=>{

box.innerHTML += `
<div class="bg-white p-3 rounded mb-2">
<b>${r.category}</b><br>
${r.location}<br>
${r.description}
${r.photo_url ? `<img src="${r.photo_url}" class="Toast(t) {

const el = document.getElementById("toast");
document.getElementById("toast-text").innerText = t;

el.style.opacity = 1;

setTimeout(()=>el.style.opacity=0,2000);
}

// SERVICE WORKER
if ('serviceWorker' in navigator) {
navigator.serviceWorker.register('sw.js');
}

</script>

</body>
</html>
