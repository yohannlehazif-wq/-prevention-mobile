<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Accueil Sécurité</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#0284c7">
    <link rel="apple-touch-icon" href="/icon-192x192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Styles spécifiques pour le pad de signature */
        #signature-pad {
            touch-action: none; /* Empêche le scroll pendant la signature sur mobile */
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased pb-20">

    <header class="bg-sky-600 text-white p-4 shadow-md sticky top-0 z-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-bold">RESTEV 85</h1>
            <p class="text-xs opacity-80">Passeport Prévention</p>
        </div>
        <i class="fa-solid fa-shield-halved text-2xl"></i>
    </header>

    <main class="p-4 max-w-lg mx-auto">
        
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6 border-l-4 border-sky-500">
            <h2 class="text-lg font-semibold text-gray-800 mb-1">Livret d'Accueil Sécurité</h2>
            <p class="text-sm text-gray-600">Bienvenue. La validation de ce module est obligatoire avant votre prise de poste.</p>
            
            <div class="mt-4 flex flex-col gap-2">
                <input type="text" placeholder="Nom et Prénom du salarié" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-sky-500 outline-none">
                <input type="text" placeholder="Nom de l'entreprise" class="w-full border border-gray-300 rounded-lg p-2 text-sm focus:ring-2 focus:ring-sky-500 outline-none">
            </div>
        </div>

        <h3 class="font-bold text-gray-700 mb-3"><i class="fa-solid fa-list-check text-sky-500 mr-2"></i>Consignes obligatoires</h3>
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6 flex flex-col gap-4">
            
            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="mt-1 w-5 h-5 text-sky-600 rounded border-gray-300 focus:ring-sky-500">
                <span class="text-sm text-gray-700">J'ai pris connaissance des risques liés à mon poste de travail et des équipements de protection individuelle (EPI) requis.</span>
            </label>

            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="mt-1 w-5 h-5 text-sky-600 rounded border-gray-300 focus:ring-sky-500">
                <span class="text-sm text-gray-700">Je sais repérer les issues de secours et connais le point de rassemblement en cas d'évacuation.</span>
            </label>

            <label class="flex items-start gap-3 cursor-pointer">
                <input type="checkbox" class="mt-1 w-5 h-5 text-sky-600 rounded border-gray-300 focus:ring-sky-500">
                <span class="text-sm text-gray-700">J'ai été informé de la procédure à suivre en cas d'accident du travail (alerter, secourir).</span>
            </label>
        </div>

        <h3 class="font-bold text-gray-700 mb-3"><i class="fa-solid fa-pen-nib text-sky-500 mr-2"></i>Émargement numérique</h3>
        <div class="bg-white rounded-xl shadow-sm p-4 mb-6">
            <p class="text-xs text-gray-500 mb-2">Signature du salarié (Vaut acceptation des consignes)</p>
            <div class="border-2 border-dashed border-gray-300 rounded-lg bg-gray-50 relative">
                <canvas id="signature-pad" class="w-full h-40 rounded-lg"></canvas>
            </div>
            <div class="flex justify-end mt-2">
                <button id="clear-signature" class="text-sm text-red-500 hover:text-red-700 font-medium px-2 py-1">Effacer</button>
            </div>
        </div>

        <button id="submit-form" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-3 px-4 rounded-xl shadow-lg transition duration-200 flex justify-center items-center gap-2">
            <i class="fa-solid fa-check-circle"></i> Valider et générer l'attestation
        </button>

    </main>

    <div class="fixed bottom-4 right-4 z-50">
        <button class="bg-orange-500 hover:bg-orange-600 text-white rounded-full h-14 px-6 shadow-xl flex items-center justify-center gap-2 font-bold transition transform hover:scale-105">
            <i class="fa-solid fa-triangle-exclamation"></i>
            <span class="hidden sm:inline">Signalement Flash</span>
        </button>
    </div>

    <script>
        const canvas = document.getElementById('signature-pad');
        const ctx = canvas.getContext('2d');
        const clearBtn = document.getElementById('clear-signature');
        let isDrawing = false;

        // Ajuster la taille du canvas à son conteneur
        function resizeCanvas() {
            const ratio =  Math.max(window.devicePixelRatio || 1, 1);
            canvas.width = canvas.offsetWidth * ratio;
            canvas.height = canvas.offsetHeight * ratio;
            ctx.scale(ratio, ratio);
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        // Événements souris / tactile
        const startDrawing = (e) => {
            isDrawing = true;
            draw(e);
        };
        const stopDrawing = () => {
            isDrawing = false;
            ctx.beginPath();
        };
        const draw = (e) => {
            if (!isDrawing) return;
            e.preventDefault(); // Empêcher le scroll
            
            const rect = canvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);
            
            const x = clientX - rect.left;
            const y = clientY - rect.top;

            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#1f2937';

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        };

        // Mouse events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch events
        canvas.addEventListener('touchstart', startDrawing);
        canvas.addEventListener('touchmove', draw);
        canvas.addEventListener('touchend', stopDrawing);

        // Nettoyer la signature
        clearBtn.addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // Simuler la validation (Préparation pour l'insertion en base)
        document.getElementById('submit-form').addEventListener('click', () => {
            // Ici, tu pourras récupérer le canvas.toDataURL() et l'envoyer vers Supabase 
            // avec les données des inputs et l'état des checkboxes.
            const signatureData = canvas.toDataURL('image/png');
            alert("Attestation prête à être synchronisée avec la base de données !");
        });
    </script>
</body>
</html>
