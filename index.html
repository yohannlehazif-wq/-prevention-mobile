<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Application Sécurité</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .screen { display: none; }
        .active { display: block; }
        canvas { touch-action: none; border: 1px solid #ddd; border-radius: 8px; width: 100%; height: 150px; }
    </style>
</head>
<body class="bg-slate-100 font-sans pb-10">

    <header class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="flex justify-between items-center">
            <h1 class="font-black text-lg">RESTEV 85</h1>
            <span id="user-role" class="text-[10px] bg-white/20 px-2 py-1 rounded uppercase tracking-widest">Mode : Non défini</span>
        </div>
    </header>

    <main class="p-4 max-w-md mx-auto">
        <section id="scr-auth" class="screen active space-y-4">
            <h2 class="text-xl font-bold text-slate-800">Sélectionnez votre profil</h2>
            <button onclick="setRole('manager')" class="w-full bg-pink-600 text-white p-4 rounded-xl font-bold shadow-md">Manager / Tuteur</button>
            <button onclick="setRole('employee')" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold shadow-md">Salarié / Intérimaire</button>
        </section>

        <section id="scr-manager" class="screen space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <h3 class="font-bold">Générer QR Code Employé</h3>
                <input type="text" id="emp-name-gen" placeholder="Nom de l'employé" class="w-full p-2 border rounded mt-2">
                <button onclick="generateQR()" class="w-full mt-2 bg-slate-800 text-white py-2 rounded">Générer</button>
                <div id="qr-container" class="mt-4 flex justify-center"></div>
            </div>
            <div id="risks-list" class="space-y-2"></div>
        </section>

        <section id="scr-employee" class="screen space-y-4">
            <div class="bg-white p-4 rounded-xl shadow">
                <h3 class="font-bold text-blue-800">Bienvenue, <span id="emp-name-display"></span></h3>
                <button onclick="showScreen('scr-quiz')" class="w-full mt-4 bg-green-600 text-white py-3 rounded-lg font-bold">Lancer Formation Sécurité</button>
                <button onclick="showScreen('scr-report')" class="w-full mt-2 bg-amber-500 text-white py-3 rounded-lg font-bold">Signaler un Risque</button>
            </div>
        </section>

        <section id="scr-quiz" class="screen space-y-4 bg-white p-4 rounded-xl shadow">
            <h3 class="font-bold">Test de Validation (Art. L4141-2)</h3>
            <div id="quiz-content" class="space-y-4">
                <p>1. Est-ce que le port des EPI est obligatoire ?</p>
                <select id="q1" class="w-full p-2 border rounded"><option value="yes">Oui</option><option value="no">Non</option></select>
                <button onclick="finishQuiz()" class="w-full bg-blue-800 text-white py-2 rounded">Valider et Émarger</button>
            </div>
        </section>

        <section id="scr-report" class="screen space-y-4 bg-white p-4 rounded-xl shadow">
            <h3 class="font-bold">Signaler un risque</h3>
            <input type="text" id="risk-desc" placeholder="Description du risque" class="w-full p-2 border rounded">
            <select id="risk-severity" class="w-full p-2 border rounded"><option value="Faible">Faible</option><option value="Élevé">Élevé</option></select>
            <button onclick="submitRisk()" class="w-full bg-red-600 text-white py-2 rounded">Soumettre avec Géolocalisation</button>
        </section>
    </main>

    <script>
        // State Management
        let userRole = '';
        const screens = ['scr-auth', 'scr-manager', 'scr-employee', 'scr-quiz', 'scr-report'];

        function showScreen(id) {
            screens.forEach(s => document.getElementById(s).classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function setRole(role) {
            userRole = role;
            document.getElementById('user-role').innerText = "Mode : " + role;
            showScreen(role === 'manager' ? 'scr-manager' : 'scr-employee');
        }

        // QR Logic
        function generateQR() {
            const name = document.getElementById('emp-name-gen').value;
            const container = document.getElementById('qr-container');
            container.innerHTML = '';
            QRCode.toCanvas(container, `?employee=${name}`, (err) => {
                if (err) console.error(err);
            });
        }

        // Risk Logic
        function submitRisk() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const risk = {
                        desc: document.getElementById('risk-desc').value,
                        sev: document.getElementById('risk-severity').value,
                        lat: pos.coords.latitude,
                        lon: pos.coords.longitude,
                        date: new Date().toLocaleString()
                    };
                    let reports = JSON.parse(localStorage.getItem('risks') || '[]');
                    reports.push(risk);
                    localStorage.setItem('risks', JSON.stringify(reports));
                    alert("Risque transmis au manager !");
                    showScreen('scr-employee');
                });
            } else {
                alert("Géolocalisation indisponible.");
            }
        }

        function finishQuiz() {
            alert("Test validé. Attestation générée virtuellement.");
            showScreen('scr-employee');
        }
    </script>
</body>
</html>
