<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RESTEV 85 - Passeport Prévention Connecté</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .screen { display: none; }
        .screen.active { display: block; animation: smoothSlide 0.4s ease-out; }
        @keyframes smoothSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        canvas { touch-action: none; border: 1px solid #e2e8f0; background: #f8fafc; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-white/90 backdrop-blur-md border-b border-slate-100 py-3 px-4 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg text-restev-blue">RESTEV 85</h1>
            <span class="text-[10px] bg-emerald-100 text-emerald-700 px-2 py-1 rounded-full uppercase font-bold">Cloud Connecté</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 md:p-6 flex-1 w-full flex flex-col justify-center">
        
        <section id="scr-home" class="screen active">
            <div class="text-center space-y-4">
                <h2 class="text-2xl font-extrabold text-slate-900">Passeport Prévention</h2>
                <div class="grid gap-4">
                    <button onclick="switchScreen('scr-auth')" class="bg-blue-600 text-white p-4 rounded-2xl">Espace Entreprise</button>
                    <button onclick="switchScreen('scr-employee')" class="bg-pink-500 text-white p-4 rounded-2xl">Interface Salarié</button>
                </div>
            </div>
        </section>

        <section id="scr-auth" class="screen">
            <button onclick="switchScreen('scr-home')" class="mb-4 text-xs font-bold text-slate-500">← Retour</button>
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <h2 class="text-sm font-bold mb-4">Identification</h2>
                <button onclick="switchScreen('scr-manager')" class="w-full bg-blue-600 text-white py-3 rounded-xl">Se connecter</button>
            </div>
        </section>

        <section id="scr-manager" class="screen">
            <div class="bg-white p-6 rounded-3xl shadow-sm space-y-4">
                <h2 class="font-bold text-lg">Console Manager</h2>
                <div class="p-4 bg-slate-50 rounded-xl">
                    <label class="block text-xs font-bold mb-2">Générer QR Salarié</label>
                    <button onclick="switchScreen('scr-employee')" class="w-full bg-slate-900 text-white py-3 rounded-xl">Générer</button>
                </div>
                <button onclick="switchScreen('scr-home')" class="text-xs text-red-500">Déconnexion</button>
            </div>
        </section>

        <section id="scr-employee" class="screen">
            <h2 class="text-lg font-bold mb-4">Espace Salarié</h2>
            <button onclick="switchScreen('scr-signature')" class="w-full bg-teal-600 text-white py-3 rounded-xl">Accès Signature</button>
        </section>

        <section id="scr-signature" class="screen">
            <div class="space-y-4">
                <h2 class="font-bold">Signature</h2>
                <canvas id="canv-employee" width="300" height="100"></canvas>
                <button onclick="clearCanvas('canv-employee')" class="text-xs underline text-slate-500">Effacer</button>
                <button onclick="alert('Attestation générée!')" class="w-full bg-emerald-600 text-white py-3 rounded-xl">Valider</button>
                <button onclick="switchScreen('scr-employee')" class="w-full bg-slate-100 py-3 rounded-xl">Retour</button>
            </div>
        </section>

    </main>

    <script>
        // Gestion de la navigation
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Logique simplifiée pour le Canvas
        const canvases = ['canv-employee'];
        canvases.forEach(id => {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            let isDrawing = false;

            canvas.addEventListener('mousedown', () => isDrawing = true);
            canvas.addEventListener('mousemove', (e) => {
                if (!isDrawing) return;
                ctx.fillRect(e.offsetX, e.offsetY, 2, 2);
            });
            canvas.addEventListener('mouseup', () => isDrawing = false);
        });

        function clearCanvas(id) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
