<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESTEV 85</title>

<!-- QR Code -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<!-- Tailwind (simplifié CDN) -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- FontAwesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
canvas { touch-action: none; }
</style>
</head>

<body class="bg-slate-50 font-sans text-slate-800">

<!-- HEADER -->
<header class="bg-blue-600 text-white p-4 text-center font-bold">
RESTEV 85 – Test QR Code
</header>

<!-- DASHBOARD -->
<section id="scr-dashboard" class="p-6 text-center">
<button onclick="generateEmployeeQR()" 
class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow">
Générer QR Code
</button>
</section>

<!-- QR SCREEN -->
<section id="scr-qr-display" class="hidden p-6 text-center space-y-4">
<h2 class="text-lg font-bold">QR Code d'accès</h2>

<div class="bg-white p-4 rounded-xl shadow inline-block">
<canvas id="qr-canvas"></canvas>
</div>

<br>

<button onclick="switchScreen('scr-dashboard')" 
class="bg-gray-800 text-white px-4 py-2 rounded-xl">
Retour
</button>
</section>

<!-- SCRIPT -->
<script>

function switchScreen(screenId) {
  document.getElementById('scr-dashboard').classList.add('hidden');
  document.getElementById('scr-qr-display').classList.add('hidden');

  document.getElementById(screenId).classList.remove('hidden');
}

function generateEmployeeQR() {

  // Affiche écran QR
  switchScreen('scr-qr-display');

  setTimeout(() => {

    const canvas = document.getElementById('qr-canvas');

    if (!canvas) {
      alert("❌ Canvas introuvable");
      return;
    }

    if (typeof QRCode === "undefined") {
      alert("❌ Librairie QR non chargée");
      return;
    }

    // URL avec mode onboarding
    const url = window.location.origin + window.location.pathname + '?mode=onboarding';

    // Nettoyage
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Génération QR
    QRCode.toCanvas(canvas, url, {
      width: 220,
      margin: 2
    }, function(error) {
      if (error) {
        alert("Erreur QR");
        console.error(error);
      }
    });

  }, 200);

}

</script>

</body>
</html>
