<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Passeport Prévention Numérique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'restev-blue': '#2b61a4', 'restev-blue-dark': '#1e4575', 'restev-magenta': '#b72077', 'restev-magenta-dark': '#8e175c', 'restev-teal': '#6caea2', 'restev-gold': '#f1a115', 'restev-gold-light': '#fef6e7' }, boxShadow: { 'premium': '0 10px 30px -5px rgba(43, 97, 164, 0.05)', 'card-hover': '0 20px 40px -5px rgba(43, 97, 164, 0.1)' } } } }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .screen { display: none; }
        .screen.active { display: block; animation: smoothSlide 0.3s ease-out; }
        @keyframes smoothSlide { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        canvas { touch-action: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen">
    <header class="bg-white border-b border-slate-100 py-3 px-4 sticky top-0 z-40 backdrop-blur-md bg-white/95">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <img src="logo.png" alt="Logo RESTEV 85" class="h-12 w-auto cursor-pointer" onclick="switchScreen('scr-home')">
        </div>
    </header>

    <main class="max-w-5xl mx-auto p-4 md:p-6 min-h-[80vh] flex flex-col justify-center">
        <section id="scr-home" class="screen active max-w-xl mx-auto w-full space-y-6">
            <h1 class="text-2xl font-extrabold text-center">Passeport Prévention</h1>
            <div class="grid gap-4">
                <button onclick="switchScreen('scr-direction')" class="p-5 bg-white border border-slate-100 rounded-2xl shadow hover:border-restev-gold">Direction & Supervision</button>
                <button onclick="switchScreen('scr-auth')" class="p-5 bg-white border border-slate-100 rounded-2xl shadow hover:border-restev-blue">Espace Entreprise</button>
            </div>
        </section>

        </main>
        <script>
        // 1. Initialisation
        const supabase = supabase.createClient('VOTRE_URL_SUPABASE', 'VOTRE_CLE_API');
        let activeCanvas = {}, ctxCanvas = {};
        
        // 2. Gestion des écrans
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 3. Logique de Signature (Canvas)
        function initCanvas(id) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            activeCanvas[id] = canvas;
            ctxCanvas[id] = ctx;
            let isDrawing = false;
            
            const start = (e) => { isDrawing = true; ctx.beginPath(); ctx.moveTo(e.offsetX || e.touches[0].clientX - canvas.getBoundingClientRect().left, e.offsetY || e.touches[0].clientY - canvas.getBoundingClientRect().top); };
            const draw = (e) => { if (!isDrawing) return; ctx.lineTo(e.offsetX || e.touches[0].clientX - canvas.getBoundingClientRect().left, e.offsetY || e.touches[0].clientY - canvas.getBoundingClientRect().top); ctx.stroke(); };
            
            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', draw); canvas.addEventListener('mouseup', () => isDrawing = false);
            canvas.addEventListener('touchstart', start); canvas.addEventListener('touchmove', draw); canvas.addEventListener('touchend', () => isDrawing = false);
        }

        // 4. Soumission des alertes
        async function submitRealRiskReport() {
            const alertData = {
                category: document.getElementById('risk-category').value,
                location: document.getElementById('risk-location').value,
                desc: document.getElementById('risk-desc').value,
                severity: document.getElementById('risk-level').value,
                status: 'pending'
            };
            
            const { error } = await supabase.from('alerts').insert([alertData]);
            if (error) alert("Erreur d'envoi");
            else { alert("Alerte transmise"); switchScreen('scr-employee'); }
        }

        // 5. Finalisation Attestation
        function finalizeOfficialAttestation() {
            document.getElementById('lbl-view-emp').innerText = "Employé : " + document.getElementById('reg-emp-name').value;
            document.getElementById('img-render-emp').src = activeCanvas['canv-employee'].toDataURL();
            document.getElementById('img-render-tutor').src = activeCanvas['canv-tutor'].toDataURL();
            switchScreen('scr-attestation');
        }

        // Initialisation globale
        window.onload = () => {
            initCanvas('canv-employee');
            initCanvas('canv-tutor');
        };
    </script>
</body>
</html>
