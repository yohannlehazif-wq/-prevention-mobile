<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Passeport Prévention Connecté</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'restev-blue': '#3b82f6',
                        'restev-blue-dark': '#1d4ed8',
                        'restev-magenta': '#ec4899',
                        'restev-magenta-dark': '#db2777',
                        'restev-teal': '#14b8a6',
                        'restev-gold': '#f59e0b',
                        'restev-gold-light': '#fffbeb'
                    },
                    boxShadow: {
                        'premium': '0 10px 30px -5px rgba(59, 130, 246, 0.1), 0 4px 12px -2px rgba(0, 0, 0, 0.03)',
                        'card-hover': '0 20px 40px -5px rgba(59, 130, 246, 0.15), 0 8px 20px -4px rgba(0, 0, 0, 0.05)'
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfd; }
        .screen { display: none; }
        .screen.active { display: block; animation: smoothSlide 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes smoothSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        canvas { touch-action: none; }
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            .print-view { display: block !important; background: white; color: black; border: none !important; box-shadow: none !important; }
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">
    <script>
        // Logique Supabase (votre clé est incluse dans le fichier récupéré)
        const SUPABASE_URL = "https://bcuzmjcbhriyzmmiodsi.supabase.co";
        // Note : Gardez votre clé anonyme privée si vous déployez ce site en ligne.
        
        // Fonctions de navigation
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Initialisation des canvases pour signature
        function initCanvas(id) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            let isDrawing = false;
            
            function drawStart(e) { isDrawing = true; }
            function drawMove(e) {
                if (!isDrawing) return;
                const rect = canvas.getBoundingClientRect();
                const x = (e.clientX || e.touches[0].clientX) - rect.left;
                const y = (e.clientY || e.touches[0].clientY) - rect.top;
                ctx.lineTo(x, y);
                ctx.stroke();
            }
            
            canvas.addEventListener('mousedown', drawStart);
            canvas.addEventListener('mousemove', drawMove);
            canvas.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
            
            // Touch events
            canvas.addEventListener('touchstart', drawStart);
            canvas.addEventListener('touchmove', drawMove, {passive:false});
            canvas.addEventListener('touchend', () => { isDrawing = false; ctx.beginPath(); });
        }

        // Initialisation au chargement
        window.onload = () => {
            initCanvas('canv-employee');
            initCanvas('canv-tutor');
        };

        function clearCanvas(id) {
            const canvas = document.getElementById(id);
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function finalizeOfficialAttestation() {
            // Logique de génération de l'attestation finale
            const empName = document.getElementById('reg-emp-name').value;
            document.getElementById('lbl-view-emp').innerText = empName;
            document.getElementById('img-render-emp').src = document.getElementById('canv-employee').toDataURL();
            document.getElementById('img-render-tutor').src = document.getElementById('canv-tutor').toDataURL();
            switchScreen('scr-attestation');
        }
    </script>
</body>
</html>
