<!DOCTYPE html>
<html lang="fr" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV 85 - Expert Prévention</title>
    
    <meta name="theme-color" content="#3065a8">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        restev: {
                            blue: '#3065a8',
                            dark: '#1e4475',
                            teal: '#75bba8',
                            magenta: '#ae227d',
                            yellow: '#e6a00f',
                            light: '#f4f7fa'
                        }
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body {
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            background-color: #f4f7fa;
            margin-bottom: 80px;
        }
        #splash {
            position: fixed; inset: 0; z-index: 9999; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #254d80 0%, #112237 100%);
            transition: all 0.6s cubic-bezier(0.77, 0, 0.175, 1); overflow: hidden;
        }
        .logo-wrapper { position: relative; display: inline-block; transform: scale(0) rotate(-15deg); animation: logoPopIn 1s cubic-bezier(0.34, 1.7, 0.64, 1) 0.2s forwards; margin-bottom: 25px; }
        .splash-logo { width: 120px; height: 120px; border-radius: 16px; background: white; padding: 12px; position: relative; z-index: 2; box-shadow: 0 0 30px rgba(48, 101, 168, 0.4); }
        .logo-pulse-ring { position: absolute; inset: -5px; border: 2px solid #75bba8; border-radius: 20px; z-index: 1; opacity: 0; animation: ringPulse 2.5s ease-out infinite 1.2s; }
        .app-title-reveal { font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; background: linear-gradient(45deg, #ffffff, #93c5fd); -webkit-background-clip: text; -webkit-text-fill-color: transparent; opacity: 0; transform: translateY(15px); animation: textSlideUp 0.6s ease-out 0.8s forwards; }
        .splash-subtitle-animated { font-size: 0.85rem; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: #75bba8; opacity: 0; transform: translateY(10px); animation: textSlideUp 0.6s ease-out 1s forwards; margin-top: 5px; }
        .btn-enter-premium { position: relative; background: white; color: #1e4475; border: none; padding: 14px 40px; border-radius: 50px; font-weight: 800; font-size: 0.95rem; letter-spacing: 1.5px; opacity: 0; animation: btnReveal 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 1.4s forwards, breathing 3s ease-in-out infinite 2s; transition: all 0.2s ease; }
        @keyframes logoPopIn { 0% { transform: scale(0) rotate(-25deg); } 70% { transform: scale(1.15) rotate(5deg); } 100% { transform: scale(1) rotate(0deg); } }
        @keyframes ringPulse { 0% { transform: scale(0.95); opacity: 0.8; } 100% { transform: scale(1.3); opacity: 0; } }
        @keyframes textSlideUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes btnReveal { to { opacity: 1; transform: scale(1); } }
        @keyframes breathing { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.03); } }
        .info-banner { background: #e0f2fe; color: #0369a1; padding: 6px 0; overflow: hidden; white-space: nowrap; font-weight: 600; font-size: 0.75rem; border-bottom: 1px solid #bae6fd; }
        .ticker { display: inline-block; animation: ticker 35s linear infinite; }
        .app-page { display: none; }
        .active-page { display: block; }
        @keyframes ticker { 0% { transform: translateX(100vw); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body class="dark:bg-slate-900 transition-colors duration-200">

    <div id="splash">
        <div class="text-center text-white">
            <div class="logo-wrapper">
                <div class="splash-logo flex items-center justify-center">
                    <i class="fa-solid fa-shield-halved text-5xl text-restev-blue"></i>
                </div>
                <div class="logo-pulse-ring"></div>
            </div>
            <h2 class="app-title-reveal">RESTEV 85</h2>
            <p class="splash-subtitle-animated">Expert Prévention</p>
            <button class="btn-enter-premium mt-8" onclick="closeSplash()"><span>ENTRER</span></button>
        </div>
    </div>

    <header class="bg-white dark:bg-slate-800 border-b-4 border-restev-yellow sticky top-0 z-40 px-4 py-3 shadow-sm flex items-center justify-between">
        <div class="flex items-center space-x-2">
            <i class="fa-solid fa-shield-halved text-2xl text-restev-blue"></i>
            <div>
                <h1 class="font-black text-slate-800 dark:text-white text-lg tracking-wide">RESTEV 85</h1>
                <span class="text-[10px] text-restev-teal font-bold uppercase tracking-widest">Prévention Terrain</span>
            </div>
        </div>
        <button onclick="toggleNetwork()" id="networkStatusBtn" class="flex items-center space-x-1.5 px-3 py-1 bg-green-100 text-green-800 rounded-full text-xs font-bold">
            <span id="networkDot" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
            <span id="networkText">En ligne</span>
        </button>
    </header>

    <main class="p-4 max-w-md mx-auto w-full">
        <form onsubmit="submitDanger(event)" class="space-y-4">
            <button type="submit" class="w-full bg-restev-magenta text-white font-bold py-3.5 rounded-xl uppercase tracking-wider text-sm">Transmettre l'alerte</button>
        </form>
    </main>

    <script>
        let isOnline = true;
        let syncCount = 0;

        function closeSplash() { document.getElementById('splash').style.opacity = '0'; setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 600); }
        
        function toggleNetwork() {
            isOnline = !isOnline;
            const text = document.getElementById('networkText');
            text.innerText = isOnline ? "En ligne" : "Hors-ligne";
            if (isOnline && syncCount > 0) {
                alert(`🌐 Réseau rétabli ! ${syncCount} signalement(s) synchronisés.`);
                syncCount = 0;
            }
        }

        async function submitDanger(e) {
            e.preventDefault();
            if (navigator.vibrate) navigator.vibrate(50);

            const data = {
                gravite: document.querySelector('input[name="dangerLvl"]:checked')?.value || 'faible',
                nature: document.querySelector('select')?.value || 'Autre',
                commentaire: document.querySelector('textarea')?.value || ''
            };

            if (!isOnline) {
                syncCount++;
                document.getElementById('sync-count').innerText = syncCount;
                localStorage.setItem('pending_danger', JSON.stringify(data));
                alert("Rapport stocké localement (Hors-ligne). Il sera transmis au retour réseau.");
            } else {
                try {
                    // Exemple d'appel API
                    const response = await fetch('TON_URL_SUPABASE_API/rest/v1/dangers', {
                        method: 'POST',
                        headers: { 'apikey': 'TA_CLE', 'Authorization': 'Bearer TA_CLE', 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (response.ok) alert("Alerte transmise avec succès !");
                } catch (err) {
                    alert("Erreur de connexion lors de l'envoi.");
                }
            }
            e.target.reset();
        }
    </script>
</body>
