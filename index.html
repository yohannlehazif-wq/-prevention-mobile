<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RESTEV Hub Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white border-b p-4 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="font-black text-slate-800 text-lg italic tracking-tight">RESTEV <span class="text-restev-blue">85</span></h1>
            <div id="connection-status" class="w-3 h-3 rounded-full bg-emerald-500"></div>
        </div>
    </header>

    <main id="app" class="max-w-md mx-auto p-4">
        <div id="view-container"></div>
    </main>

    <script>
        // --- 1. CONFIGURATION ---
        const CONFIG = {
            supabaseUrl: "https://hrxnksbmugavmqiftckk.supabase.co",
            supabaseKey: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." // REMPLACE PAR TA VRAIE CLÉ
        };

        // --- 2. ÉTAT DE L'APPLICATION ---
        const AppState = {
            user: { name: null, role: null, sector: null },
            risks: [],
            supabase: supabase.createClient(CONFIG.supabaseUrl, CONFIG.supabaseKey)
        };

        // --- 3. COUCHE API (DATA) ---
        const API = {
            async fetchRisks() {
                const { data, error } = await AppState.supabase
                    .from('risks')
                    .select('*')
                    .order('created_at', { ascending: false });
                return error ? [] : data;
            },
            async saveRisk(payload) {
                const { error } = await AppState.supabase.from('risks').insert([payload]);
                return !error;
            }
        };

        // --- 4. COUCHE UI (VIEW) ---
        const UI = {
            renderScreen(id, content) {
                document.getElementById('view-container').innerHTML = content;
                document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
                document.getElementById(id)?.classList.add('active');
            },
            
            // Templates d'écrans
            renderHome() {
                return `
                    <div id="scr-home" class="screen active space-y-4">
                        <h2 class="text-xl font-bold">Bienvenue au Hub Sécurité</h2>
                        <button onclick="App.login('manager')" class="w-full bg-slate-900 text-white p-4 rounded-xl">Mode Manager</button>
                        <button onclick="App.login('employee')" class="w-full bg-restev-blue text-white p-4 rounded-xl">Mode Salarié</button>
                    </div>
                `;
            }
        };

        // --- 5. CONTRÔLEUR (LOGIQUE) ---
        const App = {
            init() {
                UI.renderScreen('scr-home', UI.renderHome());
            },
            
            async login(role) {
                AppState.user.role = role;
                // Logique de transition...
                console.log("Connecté en tant que :", role);
                // Charger les données initiales
                if (role === 'manager') {
                    const data = await API.fetchRisks();
                    console.log("Risques chargés :", data);
                }
            }
        };

        // Lancement
        App.init();
    </script>
</body>
</html>
